# ---------------------------------------------------------------------------
# Konfigurasi RAG layer (Fase 3).
# ---------------------------------------------------------------------------

embedding:
  # Multilingual, ringan, CPU-friendly (mendukung Bahasa Indonesia).
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  batch_size: 64

vector_store:
  persist_dir: "chroma_db"
  collection_name: "reviews"

data:
  # Sumber review untuk di-index (hasil pipeline Fase 1).
  csvs:
    - "data/processed/train.csv"
    - "data/processed/val.csv"
    - "data/processed/test.csv"

insight:
  # Emosi negatif yang jadi fokus insight keluhan.
  negative_emotions: ["anger", "sadness"]
  top_k: 20
  cache_ttl_seconds: 3600
  cache_max_size: 128

chat:
  top_k: 8
  # Gerbang relevansi hybrid: lolos jika salah satu terpenuhi.
  # min_score dikalibrasi via evaluate_retrieval (2026-07-19): top-1 in-domain
  # min 0.614, probe out-of-domain 0.418-0.525 -> ambang 0.55 memisahkan keduanya.
  min_score: 0.55      # cosine similarity minimum
  min_bm25: 1.0        # skor BM25 minimum untuk hit yang lemah secara vektor
  cache_ttl_seconds: 1800
  cache_max_size: 256
