name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # e.g. "riezqidr/indo-review-intelligence"
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          HF_USER="${HF_SPACE_REPO%%/*}"
          git push "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" main:main --force
